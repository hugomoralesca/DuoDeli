<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoDeli | Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6600;
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 { color: var(--primary); margin: 0; font-size: 2.5rem; }
        p.subtitle { opacity: 0.8; font-weight: 300; }

        #menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            border-left: 5px solid var(--primary);
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.2rem; }
        .card p { margin: 5px 0; font-size: 0.9rem; line-height: 1.4; opacity: 0.9; }
        .card .price { font-weight: 600; font-size: 1.1rem; color: #fff; margin-top: 15px; display: block; }

        .loader { color: var(--primary); font-style: italic; margin-top: 50px; }
        
        footer {
            margin-top: 50px;
            font-size: 0.7rem;
            opacity: 0.5;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>DuoDeli</h1>
        <p class="subtitle">Menú Digital Autogestionado | MOCA Labs Prototype</p>
    </header>

    <div id="loading" class="loader">Cargando delicias...</div>

    <div id="menu-container">
        </div>

    <footer>
        Desarrollado por MOCA Labs para DuoDeli Zapopan. <br>
        Infraestructura: GitHub + Netlify + Google Sheets.
    </footer>

    <script>
        // REEMPLAZA EL LINK DE ABAJO POR TU LINK .CSV DE GOOGLE SHEETS
        const SHEET_URL = 'TU_LINK_DE_GOOGLE_SHEETS_AQUÍ';

        async function fetchMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                
                // Limpiamos el contenedor
                const container = document.getElementById('menu-container');
                const loading = document.getElementById('loading');
                container.innerHTML = '';
                
                // Procesamos las filas (separadas por comas)
                const rows = data.split('\n').slice(1); 

                rows.forEach(row => {
                    const columns = row.split(',');
                    
                    // Solo creamos la tarjeta si tiene nombre y precio
                    if (columns.length >= 3 && columns[0].trim() !== "") {
                        const name = columns[0];
                        const desc = columns[1];
                        const price = columns[2];

                        const cardHTML = `
                            <div class="card">
                                <h3>${name}</h3>
                                <p>${desc}</p>
                                <span class="price">$${price}</span>
                            </div>
                        `;
                        container.innerHTML += cardHTML;
                    }
                });

                loading.style.display = 'none';

            } catch (error) {
                console.error('Error cargando el menú:', error);
                document.getElementById('loading').innerHTML = 'Error al conectar con el inventario.';
            }
        }

        // Ejecutar al cargar la página
        fetchMenu();
    </script>
</body>
</html>
