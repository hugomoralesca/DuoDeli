<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoDeli | Gourmet & Tradición</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6600;
            --dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-dim: #bbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- HERO CON VIDEO (EL CAMBIO) --- */
        .hero {
            position: relative;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            margin-top: 60px;
        }

        .hero-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.4);
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* --- BOTONES --- */
        .btn-wa {
            display: inline-flex;
            align-items: center;
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-wa:hover { transform: scale(1.05); }

        /* --- SECCIONES --- */
        .container {
            max-width: 1100px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* --- GRID DE MENÚ --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .menu-item {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
        }

        /* --- GALERÍA ESTÁTICA --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            filter: grayscale(30%);
            transition: 0.3s;
        }

        .gallery img:hover { filter: grayscale(0%); transform: scale(1.02); }

        /* --- UBICACIÓN Y REDES --- */
        .footer {
            background: #000;
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid #333;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .social-links a img {
            width: 30px;
            filter: invert(1);
        }

        iframe {
            width: 100%;
            max-width: 800px;
            height: 300px;
            border-radius: 15px;
            border: none;
            filter: invert(90%) hue-rotate(180deg); /* Mapa modo oscuro */
        }
    </style>
</head>
<body>

    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#menu">Menú</a>
        <a href="#galeria">Galería</a>
        <a href="#contacto">Ubicación</a>
    </nav>

    <header id="inicio" class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="video-hero.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>DuoDeli Gourmet</h1>
            <p style="margin-bottom: 30px; color: #ccc;">7 años creando momentos inolvidables</p>
            <a href="https://wa.me/523788851687" class="btn-wa">
                Hacer Pedido
            </a>
        </div>
    </header>

    <section id="menu" class="container">
        <div class="section-title">
            <h2>Nuestra Carta</h2>
            <p>Sincronizada en tiempo real desde cocina</p>
        </div>
        <div id="menu-container" class="menu-grid">
            </div>
    </section>

    <section id="galeria" class="container">
        <div class="section-title">
            <h2>Especialidades</h2>
        </div>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=400" alt="Pan 1">
            <img src="https://images.unsplash.com/photo-1541339946196-92d535cd53fb?auto=format&fit=crop&w=400" alt="Dip 1">
            <img src="https://images.unsplash.com/photo-1586444248902-2f64eddf13cf?auto=format&fit=crop&w=400" alt="Mesa 1">
            <img src="https://images.unsplash.com/photo-1517433670267-08bbd4be890f?auto=format&fit=crop&w=400" alt="Pan 2">
        </div>
    </section>

    <section id="contacto" class="footer">
        <div class="social-links">
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="IG"></a>
            <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB"></a>
        </div>
        <p style="margin-bottom: 20px;">Visítanos en Zapopan, Jalisco</p>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3732.123456789!2d-103.3912345!3d20.6712345!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjDCsDQwJzE2LjQiTiAxMDPCsDIzJzI4LjQiVw!5e0!3m2!1ses!2smx!4v1620000000000!5m2!1ses!2smx"></iframe>
    </section>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQm2_IgGg-pUfMrQyOADkutPOaBriS_vYk9JcsDF2zu3f9pa09Y6aMGeLnfaSouNk7ch2W6wdldAivm/pub?output=csv';

        async function loadMenu() {
            try {
                const response = await fetch(CSV_URL + '&cache=' + Math.random());
                const data = await response.text();
                const lines = data.split(/\r?\n/);
                const container = document.getElementById('menu-container');
                container.innerHTML = '';

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 3) {
                        const name = cols[0].replace(/"/g, "").trim();
                        const desc = cols[1].replace(/"/g, "").trim();
                        const price = cols[2].replace(/"/g, "").trim();
                        const category = cols[3] ? cols[3].replace(/"/g, "").trim() : "DuoDeli";

                        container.innerHTML += `
                            <div class="menu-item">
                                <span class="category-tag">${category}</span>
                                <h3>${name}</h3>
                                <p>${desc}</p>
                                <span style="font-size: 1.5rem; font-weight: 700;">$${price}</span>
                            </div>
                        `;
                    }
                }
            } catch (e) { console.error(e); }
        }
        loadMenu();
    </script>
</body>
</html>
