<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duo Deli | Zapopan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            color: #333;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVBAR - Estilo Las Casitas */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: white;
            border-bottom: 1px solid #eee;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 60px; /* Tamaño optimizado para el logo */
            width: auto;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-right a img {
            width: 25px; /* Icono de Instagram */
            transition: 0.3s;
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        /* HERO SECTION */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 90px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)), url('hero.jpg');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .hero h1 {
            font-size: clamp(35px, 8vw, 65px);
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        /* GALERÍA */
        .gallery-section {
            padding: 80px 5%;
            text-align: center;
        }

        .gallery-section h2 {
            font-weight: 300;
            margin-bottom: 40px;
            color: #555;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-grid img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* UBICACIÓN */
        .map-section {
            padding: 80px 5%;
            background-color: #f9f9f9;
            text-align: center;
        }

        .map-container {
            max-width: 1000px;
            margin: 40px auto 0;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            height: 450px;
            border: 5px solid white;
        }

        footer {
            padding: 40px 5%;
            text-align: center;
            font-size: 13px;
            color: #999;
            border-top: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .navbar { padding: 10px 5%; }
            .logo-container img { height: 45px; }
            .map-container { height: 300px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="logoduodeli.png" alt="Duo Deli Logo">
        </div>
        <div class="nav-right">
            <a href="https://www.instagram.com/duodeli_/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
            </a>
            <a href="https://wa.me/523788851687" class="btn-whatsapp">Contacto</a>
        </div>
    </nav>

    <header class="hero">
        <h1>7 años trabajando para tí</h1>
        <p>Calidad y sabor en cada detalle</p>
    </header>

    <section class="gallery-section">
        <h2>Nuestras Especialidades</h2>
        <div class="gallery-grid">
            <img src="gal1duodeli.jpg" alt="Duo Deli 1">
            <img src="gal2duodeli.jpg" alt="Duo Deli 2">
            <img src="gal3duodeli.jpg" alt="Duo Deli 3">
        </div>
    </section>

    <section class="map-section">
        <h2>Visítanos</h2>
        <p>Paseo solares 629, Zapopan 45019</p>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3732.261849184568!2d-103.4568853!3d20.720888!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8428af04868e4c7d%3A0xc3f637651086c73d!2sPaseo%20Solares%20629%2C%20Solares%2C%2045019%20Zapopan%2C%20Jal.!5e0!3m2!1ses!2smx!4v1712880000000!5m2!1ses!2smx" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </section>

    <footer>
        <p>© 2026 Duo Deli | Hugo Morales</p>
    </footer>

</body>
</html>
