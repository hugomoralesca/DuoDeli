<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoDeli | Menú Gourmet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6600;
            --dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-dim: #bbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- HERO CON VIDEO --- */
        .hero {
            position: relative;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.5); /* Oscurece el video para que el texto resalte */
        }

        .hero-content {
            z-index: 1;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--text-dim);
        }

        /* --- MENÚ DINÁMICO (GRID) --- */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-size: 2.5rem;
            color: var(--primary);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border-left: 5px solid var(--primary);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-item:hover {
            transform: translateY(-5px);
        }

        .category-tag {
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .menu-item h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .menu-item p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .price-container {
            border-top: 1px solid #333;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
        }

        .btn-wa-main {
            display: inline-flex;
            align-items: center;
            background: var(--primary);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            gap: 10px;
        }

        .btn-wa-main img { width: 20px; filter: invert(1); }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="video-hero.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <h1>DuoDeli Gourmet</h1>
            <p>7 años de tradición y sabor en Zapopan</p>
            <a href="https://wa.me/523788851687" class="btn-wa-main">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WA">
                Haz tu pedido
            </a>
        </div>
    </header>

    <div class="container">
        <div class="section-title">
            <h2>Nuestra Carta</h2>
            <p style="color: var(--text-dim);">Sincronizado en tiempo real</p>
        </div>
        
        <div id="menu-container" class="menu-grid">
            </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQm2_IgGg-pUfMrQyOADkutPOaBriS_vYk9JcsDF2zu3f9pa09Y6aMGeLnfaSouNk7ch2W6wdldAivm/pub?output=csv';

        async function loadMenu() {
            try {
                // Añadimos cache-busting para cambios inmediatos
                const response = await fetch(CSV_URL + '&cache=' + Math.random());
                const data = await response.text();
                
                const lines = data.split(/\r?\n/);
                const container = document.getElementById('menu-container');
                container.innerHTML = '';

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;

                    // Separador robusto para comas internas
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 3) {
                        const name = cols[0].replace(/"/g, "").trim();
                        const desc = cols[1].replace(/"/g, "").trim();
                        const price = cols[2].replace(/"/g, "").trim();
                        const category = cols[3] ? cols[3].replace(/"/g, "").trim() : "General";

                        const card = `
                            <div class="menu-item">
                                <span class="category-tag">${category}</span>
                                <h3>${name}</h3>
                                <p>${desc}</p>
                                <div class="price-container">
                                    <span class="price">$${price}</span>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    }
                }
            } catch (e) {
                console.error("Error cargando menú de MOCA Labs:", e);
                document.getElementById('menu-container').innerHTML = "<p>Actualizando menú...</p>";
            }
        }
        
        loadMenu();
    </script>
</body>
</html>
