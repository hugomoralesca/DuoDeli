<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duo Deli | Zapopan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #0d0d0d;
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background-color: rgba(0, 0, 0, 0.95);
            border-bottom: 1px solid #333;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 65px;
            width: auto;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px; /* Espacio entre iconos */
        }

        /* ICONOS COMO BOTONES */
        .nav-icon img, .footer-social img {
            width: 28px;
            filter: invert(1); /* Iconos blancos */
            transition: 0.3s;
        }

        .nav-icon:hover img, .footer-social a:hover img {
            opacity: 0.7;
        }

        /* HERO SECTION */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 80px;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('heroduodeli.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        h1 {
            font-size: clamp(35px, 8vw, 65px);
            margin-bottom: 10px;
            color: #ffffff;
        }

        .hero p {
            font-size: clamp(16px, 4vw, 22px);
            color: #ccc;
            margin-bottom: 30px;
        }

        /* BOTÓN WHATSAPP GRANDE EN EL HERO (OPCIONAL) */
        .btn-wa-main {
            background-color: #25d366;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-wa-main img {
            width: 20px;
            filter: brightness(0) invert(1);
        }

        /* GALERÍA */
        .gallery-section {
            padding: 80px 5%;
            text-align: center;
            background-color: #000;
        }

        .gallery-section h2 {
            font-weight: 300;
            margin-bottom: 40px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-grid img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid #222;
        }

        /* UBICACIÓN */
        .map-section {
            padding: 80px 5%;
            background-color: #0d0d0d;
            text-align: center;
            border-top: 1px solid #222;
        }

        .map-container {
            max-width: 1000px;
            margin: 40px auto 0;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            height: 450px;
            border: 2px solid #333;
        }

        /* FOOTER */
        .footer-section {
            padding: 60px 5% 40px;
            text-align: center;
            background-color: #000;
            border-top: 1px solid #222;
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .footer-info p {
            font-size: 14px;
            color: #555;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .navbar { padding: 10px 5%; }
            .logo-container img { height: 50px; }
            .map-container { height: 300px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="duodelilogo.png" alt="Duo Deli Logo">
        </div>
        <div class="nav-right">
            <a href="https://www.instagram.com/duodeli_/" target="_blank" class="nav-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
            </a>
            <a href="https://wa.me/523788851687" target="_blank" class="nav-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
            </a>
        </div>
    </nav>

    <header class="hero">
        <h1>7 años trabajando para tí</h1>
        <p>Calidad y sabor en cada detalle</p>
        <a href="https://wa.me/523788851687" class="btn-wa-main">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WA">
            Contáctanos
        </a>
    </header>

    <section class="gallery-section">
        <h2>Nuestras Especialidades</h2>
        <div class="gallery-grid">
            <img src="gal1duodeli.jpg" alt="Especialidad 1">
            <img src="gal2duodeli.jpg" alt="Especialidad 2">
            <img src="gal3duodeli.jpg" alt="Especialidad 3">
        </div>
    </section>

    <section class="map-section">
        <h2>¿Dónde estamos?</h2>
        <p style="color: #888;">Paseo solares 629, Zapopan 45019</p>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3732.2541814670416!2d-103.4542864!3d20.720235!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8428af02f5a60e07%3A0x6b77c5d9c6c57f2a!2sPaseo%20Solares%20629%2C%20Solares%2C%2045019%20Zapopan%2C%20Jal.!5e0!3m2!1ses-419!2smx!4v1712885000000!5m2!1ses-419!2smx" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </section>

    <div class="footer-section">
        <div class="footer-social">
            <a href="https://www.instagram.com/duodeli_/" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
            </a>
            <a href="https://wa.me/523788851687" target="_blank">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
            </a>
        </div>
        <div class="footer-info">
            <p>Paseo solares 629, Zapopan, Jal.</p>
            <p>© 2026 Duo Deli</p>
        </div>
    </div>

</body>
</html>
